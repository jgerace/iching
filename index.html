<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>I Ching — Consult the Oracle</title>
    <script src="data.js"></script>
    <script src="i-ching.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="i-ching.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://www.johngerace.com">John Gerace</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-0">
                    <li class="nav-item"><a class="nav-link active" href="./index.html">Consult</a></li>
                    <li class="nav-item"><a class="nav-link" href="./browse.html">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="./resources.html">Resources</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-content">
        <!-- Intro -->
        <div class="intro" id="intro">
            <h1>I Ching</h1>
            <p class="subtitle">Still your mind. Hold your concern.<br>Cast the sticks six times to reveal your hexagram.</p>

            <div class="casting-area">
                <button id="throw" class="btn-oracle" onclick="get_monogram('throw')" count="0">
                    Cast Sticks
                </button>
                <!-- Monogram rows — line 6 first in DOM (drawn last), renders at top -->
                <div class="monogram-stack">
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                    <div class="monogram-item"><span class="monogram" throw="0"></span><span class="monogram-description"></span></div>
                </div>
            </div>
        </div><!-- /intro -->

        <!-- Hexagram preview -->
        <div class="row text-center align-items-start justify-content-center g-4" id="hexagram-preview" style="margin-top: 1rem;">
            <div class="col-auto fadable" onclick="">
                <div class="hexagram-card">
                    <span class="symbol"></span>
                    <p class="name mb-0"></p>
                </div>
            </div>
            <div class="col-auto fadable transition-text">
                <span class="arrow">→</span>
                <span>Transitioning to</span>
            </div>
            <div class="col-auto fadable" onclick="">
                <div class="hexagram-card">
                    <span class="symbol"></span>
                    <p class="name mb-0"></p>
                </div>
            </div>
        </div>

        <div class="text-center fadable" id="instruction">
            Select a hexagram to view its reading
        </div>

        <!-- Hexagram detail -->
        <div class="hexagram-detail text-center" id="hexagram">
            <span class="symbol"></span>
            <p class="name"></p>

            <span class="section-label">Judgment</span>
            <p class="judgment"></p>

            <span class="section-label">Image</span>
            <div class="trigrams-block">
                    <div class="trigram">
                        <p class="figure mb-0"></p>
                        <p class="image_and_attributes mb-0"></p>
                    </div>
                    <div class="trigram">
                        <p class="figure mb-0"></p>
                        <p class="image_and_attributes mb-0"></p>
                    </div>
                </div>
            <p class="image"></p>

            <span class="section-label">Lines</span>
            <div class="lines mx-auto"></div>
        </div>
    </div><!-- /page-content -->

    <script data-goatcounter="https://discombobulatusimperator.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
    <noscript><img src="https://discombobulatusimperator.goatcounter.com/count?p=/iching/"></noscript>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
